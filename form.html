<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | M&C Training Academy</title>
  <link rel="icon" href="images/pix.jpg" type="image/jpg">

  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body.login-page {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: url('images/new.jpg') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      animation: fadeUp .8s ease;
    }

    .nav-title {
      color: #333333;
      animation: fadeLeft 1s ease;
      transition: .3s;
    }

    .nav-title:hover {
      color: rgb(196,11,11);
    }

    .nav-title img {
      border-radius: 50%;
      animation: float 3s ease-in-out infinite;
      transition: .4s;
    }

    .nav-title img:hover {
      transform: rotate(360deg) scale(1.15);
    }

    .fav-list a {
      text-decoration: none;
      color: #444444;
      font-weight: bold;
      font-size: 0.85rem;
      position: relative;
      transition: .35s;
    }

    .fav-list a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 0;
      height: 2px;
      background: rgb(196,11,11);
      transition: .4s;
    }

    .fav-list a:hover::after,
    .fav-list a.active::after {
      width: 100%;
    }

    .fav-list a:hover,
    .fav-list a.active {
      color: rgb(196,11,11);
      transform: translateY(-3px);
    }

    
    .login-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      animation: fadeUp 1s ease;
    }

    
    .custom-input {
      background: transparent;
      border: none;
      border-bottom: 2px solid rgba(255, 255, 255, 0.7);
      transition: border-color 0.3s ease;
    }

    .custom-input:focus {
      outline: none;
      box-shadow: none;
      border-bottom-color: rgb(196, 11, 11);
    }

    
    ::selection {
      background: rgb(196,11,11);
      color: #fff;
    }
  </style>
</head>
<body class="login-page text-gray-800 min-h-screen flex flex-col justify-between">

  
  <nav class="top-bar bg-white border-b border-gray-200 px-4 sm:px-8 py-3">
    <div class="flex flex-wrap items-center justify-between mx-auto max-w-7xl">
      
      <a href="index.html" class="logo-link flex items-center">
        <h1 class="nav-title text-xl font-bold flex items-center gap-2 sm:gap-3">
          <img src="images/pix.jpg" width="45" height="45" class="w-10 h-10 sm:w-11 sm:h-11 rounded-full object-cover" alt="Logo"/> 
          <span>M&C Training Academy.</span>
        </h1>
      </a>

      
      <button data-collapse-toggle="navbar-dropdown" type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg lg:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200" aria-controls="navbar-dropdown" aria-expanded="false">
          <span class="sr-only">Open main menu</span>
          <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 17 14">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 1h15M1 7h15M1 13h15"/>
          </svg>
      </button>

      
      <div class="hidden w-full lg:block lg:w-auto mt-4 lg:mt-0" id="navbar-dropdown">
        <ul class="fav-list flex flex-col lg:flex-row items-start lg:items-center gap-3 lg:gap-4 font-bold text-sm bg-white p-4 lg:p-0 rounded-lg border lg:border-0 border-gray-100">
          <li><a href="index.html" class="block py-2 px-1">Home</a></li>
          <li><a href="about.html" target="_tab" class="block py-2 px-1">About Us</a></li>
          <li><a href="product.html" target="_tab" class="block py-2 px-1">Our Product</a></li>
          <li><a href="form.html" class="block py-2 px-1 active">Login</a></li>

          
          <li class="w-full lg:w-auto">
              <button id="dropdownNavbarLink" data-dropdown-toggle="dropdownNavbar" class="flex items-center justify-between w-full py-2 px-1 text-[#444444] hover:text-[rgb(196,11,11)] font-bold text-sm">
                More ▾
              </button>
              
              <div id="dropdownNavbar" class="z-10 hidden font-normal bg-white divide-y divide-gray-100 rounded-lg shadow-xl w-44">
                  <ul class="py-2 text-sm text-gray-700" aria-labelledby="dropdownLargeButton">
                    <li><a href="contact.html" target="_tab" class="block px-4 py-2 hover:bg-gray-100 hover:text-[rgb(196,11,11)]">Contact Us</a></li>
                    <li><a href="service.html" target="_tab" class="block px-4 py-2 hover:bg-gray-100 hover:text-[rgb(196,11,11)]">Crypto</a></li>
                    <li><a href="fcmb.html" target="_tab" class="block px-4 py-2 hover:bg-gray-100 hover:text-[rgb(196,11,11)]">FCMB</a></li>
                  </ul>
              </div>
          </li>
        </ul>
      </div>

    </div>
  </nav>


  <main class="flex-1 flex justify-center items-center px-4 py-12">

    <div class="login-card w-full max-w-md p-8 sm:p-10 rounded-3xl text-white text-center">
      <h2 class="text-3xl font-extrabold mb-8 tracking-wide">Login</h2>

      <form action="#" method="POST" class="space-y-6 text-left">
       
        <div>
          <label for="email" class="block text-xs uppercase tracking-wider font-semibold mb-2 text-white/90">Email Address</label>
          <input type="email" id="email" required class="custom-input w-full px-0 py-2 text-white placeholder-white/50 focus:ring-0">
        </div>

        
        <div>
          <label for="password" class="block text-xs uppercase tracking-wider font-semibold mb-2 text-white/90">Password</label>
          <input type="password" id="password" required class="custom-input w-full px-0 py-2 text-white focus:ring-0">
        </div>

      
        <div class="flex items-center justify-between text-xs sm:text-sm text-white/90 pt-2">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" class="w-4 h-4 rounded border-white/50 bg-transparent text-[rgb(196,11,11)] focus:ring-0 focus:ring-offset-0 cursor-pointer"> 
            <span>Remember Me</span>
          </label>
          <a href="#" class="font-bold underline underline-offset-4 decoration-dotted hover:text-[rgb(196,11,11)] transition-colors">Forgot Password?</a>
        </div>

      
        <button type="submit" class="w-full py-3 px-6 bg-[rgb(196,11,11)] hover:bg-[#a00909] text-white font-bold rounded-full text-base shadow-lg hover:shadow-xl active:scale-[0.98] transition-all duration-200 mt-4">
          Log in
        </button>
      </form>

      <p class="mt-8 text-sm text-white/90 font-medium">
        Don't have an account? 
        <a href="#" class="font-bold underline underline-offset-4 decoration-dotted hover:text-[rgb(196,11,11)] transition-colors">Register</a>
      </p>
    </div>

  </main>


  <footer class="bg-white text-center py-5 border-t border-gray-200 text-gray-500 text-sm">
    <p>&copy; 2026 M&C Training Academy. All rights reserved.</p>
  </footer>


  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>
</html>
